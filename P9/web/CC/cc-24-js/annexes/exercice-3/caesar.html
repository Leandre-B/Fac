  <h1>Exercice : Décodage du message</h1>

  <p>Le message codé suivant est affiché dans un tableau. Appliquez le principe du codage par décalage pour retrouver le message original.</p>
    <!-- Bravo! = Yoxsl! [ 89, 111, 120, 115, 108, 33 ] -->
  <table id="message-code">
    <tr>
      <td>Y</td><!--<td>89</td>-->
      <td>o</td><!--<td>111</td>-->
      <td>x</td><!--<td>120</td>-->
      <td>s</td><!--<td>115</td>-->
      <td>l</td><!--<td>108</td>-->
      <td>!</td><!--<td>33</td>-->
    </tr>
  </table>
